spring.application.name=pinnel-api1
spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration/{vendor}

# Expose only the health endpoint over /actuator/*; everything else stays off.
management.endpoints.web.exposure.include=health

# ----------------------------------------------------------------------
# Pinnel application configuration (pinnel.*)
# ----------------------------------------------------------------------

pinnel.cities.search-limit=20

pinnel.cdn.base-url=https://d3rc6nnyfsbnsg.cloudfront.net
pinnel.cdn.cover-path-template=/countries/{country}/cities/{city}/cover_{n}.jpg
# Per-pin logo, two sizes ({size} = small|big). Built from slugified country/city/pin names, same as city covers.
pinnel.cdn.pin-logo-path-template=/pinnel-cities-logos/countries/{country}/cities/{city}/pins-logo/{pin}/{size}/logo.jpg

# YouTube Data API — powers GET /api/pins/{id}/shorts. The api-key is profile-specific
# (dummy for local, ${YOUTUBE_API_KEY} env var for prod) so the real key is never committed.
pinnel.youtube.base-url=https://www.googleapis.com/youtube/v3
pinnel.youtube.max-results=20
