spring.datasource.url=jdbc:h2:mem:pinnel;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dummy by default so the app/tests boot without setup; set YOUTUBE_API_KEY to hit YouTube for real.
pinnel.youtube.api-key=${YOUTUBE_API_KEY:test-dummy-key}
