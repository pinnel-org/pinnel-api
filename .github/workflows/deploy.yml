name: Deploy

# Manual only. Use the "Run workflow" branch picker to choose which branch
# to build and ship to EC2. Nothing deploys on merge to main.
on:
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/pinnel-api
      SERVICE: pinnel-api
      HEALTH_URL: http://localhost/actuator/health
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: ./mvnw -B clean package

      - name: Resolve artifact path
        id: artifact
        run: echo "jar=$(ls target/pinnel-api-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/deploy_key "${{ steps.artifact.outputs.jar }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/pinnel-api-new.jar"

      - name: Deploy and health-check
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "APP_DIR='${APP_DIR}' SERVICE='${SERVICE}' HEALTH_URL='${HEALTH_URL}' bash -s" <<'REMOTE'
          set -euo pipefail
          JAR="${APP_DIR}/${SERVICE}.jar"
          BAK="${APP_DIR}/${SERVICE}.jar.bak"

          # Back up the currently deployed JAR so we can roll back on failure.
          if [ -f "$JAR" ]; then sudo cp -f "$JAR" "$BAK"; fi

          sudo mv -f /tmp/pinnel-api-new.jar "$JAR"
          sudo systemctl restart "$SERVICE"

          # Poll the health endpoint; pass on first 200, fail after the timeout.
          for i in $(seq 1 30); do
            if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
              echo "Health check passed after ${i} attempt(s)."
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed — rolling back to previous JAR."
          if [ -f "$BAK" ]; then
            sudo mv -f "$BAK" "$JAR"
            sudo systemctl restart "$SERVICE"
          fi
          exit 1
          REMOTE
